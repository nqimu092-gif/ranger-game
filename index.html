<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>護林員任務：拒絕餵食誘惑！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        
        /* * ==========================================
         * 🎨 圖片替換區 🎨
         * 只要把對應的圖片放在同一個資料夾，網頁就會自動讀取！
         * ==========================================
         */
        .img-ranger {
            /* 若有圖 1 解說員，請解除下方註解並放上檔名 */
            /* background-image: url('ranger.png'); */
            background-color: transparent;
        }
        .img-cute {
            /* 已經正式替換為您上傳的檔案 */
            background-image: url('圖片1.svg');
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center bottom;
        }
        .img-fat {
            /* 若有圖 2 肥胖松鼠，請解除下方註解並放上檔名 */
            /* background-image: url('fat.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .img-food {
            /* 若有圖 3 食物，請解除下方註解並放上檔名 */
            /* background-image: url('food.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .img-hand {
            /* 若有圖 3 遊客的手，請解除下方註解並放上檔名 */
            /* background-image: url('hand.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: top center;
        }
        .img-tree {
            /* 若有圖 2 樹幹，請解除下方註解並放上檔名 */
            /* background-image: url('tree.png'); */
            background-size: cover; background-position: center;
        }

        /* 遊戲動畫與特效 */
        #game-area { overflow: hidden; position: relative; }
        .falling { animation: fall linear forwards; }
        .shake { animation: shake 0.5s; }
        
        @keyframes fall {
            from { top: -50px; }
            to { top: calc(100% - 80px); }
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        @keyframes floatText {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.2); }
        }
        @keyframes handDrop {
            0% { top: -60px; opacity: 0; }
            20% { top: -5px; opacity: 1; }
            70% { top: -5px; opacity: 1; }
            100% { top: -60px; opacity: 0; }
        }
        .hand-anim { animation: handDrop 0.6s ease-in-out forwards; }

        .floating-text {
            position: absolute;
            color: #ef4444;
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatText 1s forwards;
            text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            z-index: 50;
        }

        /* 預設圖形 (若您日後把胖松鼠等圖片換好，也可以把對應的 Emoji 刪掉) */
        .default-fat::after { content: '🐹'; font-size: 55px; display: block; text-align: center; line-height: 80px; filter: drop-shadow(0 0 5px red); }
        .default-food::after { content: '🍪'; font-size: 35px; display: block; text-align: center; line-height: 50px; }
        .default-hand::after { content: '🤚'; font-size: 50px; display: block; text-align: center; }
        .default-ranger::after { content: '🐿️💂‍♂️'; font-size: 60px; display: block; text-align: center; }
        .default-tree { background: linear-gradient(90deg, #6b4c2a, #8b6b45); }
        .damaged-mark { position: absolute; background-color: #d4a373; width: 60%; height: 30%; top: 50%; left: 20%; border-radius: 10px; opacity: 0; transition: opacity 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .is-damaged .damaged-mark { opacity: 1; }

    </style>
</head>
<body class="bg-amber-100 flex items-center justify-center min-h-screen m-0 select-none">

    <!-- 遊戲主容器 -->
    <div id="game-container" class="w-full max-w-md h-[800px] max-h-screen bg-[#dcebc8] relative shadow-2xl overflow-hidden border-4 border-amber-800 flex flex-col">
        
        <!-- 頂部資訊列 -->
        <div id="ui-top" class="bg-amber-800 text-white p-3 flex justify-between items-center z-20">
            <div class="flex flex-col w-1/2">
                <span class="text-sm font-bold">森林健康度</span>
                <div id="health-trees" class="flex gap-1 mt-1 text-2xl drop-shadow-md transition-all h-8 items-center">
                    <!-- 樹木健康度將在這裡動態生成 -->
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-amber-200">沒收食物</div>
                <div class="flex items-end justify-end gap-2">
                    <div id="combo-display" class="text-sm font-bold text-red-300 hidden mb-1 animate-pulse"></div>
                    <div id="score" class="text-2xl font-black">0</div>
                </div>
            </div>
        </div>

        <!-- 遊戲畫面區 -->
        <div id="game-area" class="flex-grow relative bg-gradient-to-b from-blue-200 to-[#dcebc8] cursor-crosshair">
            <!-- 兩側的樹木 (圖2元素) -->
            <div id="tree-left" class="absolute left-0 top-0 bottom-0 w-16 img-tree default-tree border-r-4 border-black/20 flex flex-col justify-end pb-20">
                <div class="damaged-mark"></div>
            </div>
            <div id="tree-right" class="absolute right-0 top-0 bottom-0 w-16 img-tree default-tree border-l-4 border-black/20 flex flex-col justify-end pb-20">
                <div class="damaged-mark"></div>
            </div>

            <!-- 動態物件容器 -->
            <div id="entities" class="absolute inset-0"></div>

            <!-- 地面 -->
            <div class="absolute bottom-0 w-full h-16 bg-[#8b6b45] border-t-8 border-green-700"></div>
        </div>

        <!-- 遊戲開始/結束 覆蓋層 -->
        <div id="overlay" class="absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center p-6 text-center backdrop-blur-sm transition-opacity duration-300">
            
            <div id="start-screen" class="bg-[#fcf8ed] p-6 rounded-2xl border-4 border-amber-600 shadow-xl max-w-[90%]">
                <div class="img-ranger default-ranger h-24 mb-4 mx-auto"></div>
                <h1 class="text-3xl font-black text-amber-900 mb-2 tracking-widest">護林員任務</h1>
                <p class="text-xl font-bold text-gray-800 mb-4 bg-amber-200 inline-block px-3 py-1 rounded -rotate-2">「所以...餵食野生動物真的好嗎？」</p>
                <div class="text-left text-sm text-gray-700 space-y-2 mb-6 font-medium">
                    <p>🚨 <span class="font-bold text-red-600">遊客又來亂餵食了！</span></p>
                    <p>👉 點擊天上掉下來的<span class="text-amber-600 font-bold">人類食物</span>，將其沒收。</p>
                    <p>⚠️ 如果松鼠吃到食物，會變成<span class="text-red-600 font-bold">肥胖長牙松鼠</span>去啃咬樹皮！</p>
                    <p>🩹 若出現肥胖松鼠，請<span class="font-bold underline text-blue-600">狂點牠3次</span>送去勒戒所！</p>
                </div>
                
                <input type="text" id="player-name" placeholder="輸入您的護林員代號" class="w-full mb-4 px-4 py-3 rounded-xl border-2 border-amber-400 focus:outline-none focus:border-amber-600 text-center font-bold text-gray-700 text-lg shadow-inner">
                
                <button onclick="startGame()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-black text-xl py-4 rounded-xl shadow-lg transform transition active:scale-95 border-b-4 border-amber-800">
                    開始守護森林！
                </button>
            </div>

            <div id="game-over-screen" class="hidden bg-[#fcf8ed] p-6 rounded-2xl border-4 border-red-600 shadow-xl max-w-[90%] w-full">
                <div class="img-fat default-fat h-24 w-24 mx-auto mb-4 bg-red-100 rounded-full border-4 border-red-400 p-2"></div>
                <h1 class="text-3xl font-black text-red-600 mb-2">森林受損嚴重</h1>
                <div class="bg-red-50 p-3 rounded-lg text-left text-sm text-red-800 font-medium mb-4 border border-red-200">
                    <p class="mb-2">「人類食物會導致野生動物太肥、嚴重影響健康...」</p>
                    <p>「餵食更會導致族群過度成長，使林木遭受嚴重鼠害...」</p>
                </div>
                <p class="text-lg font-bold text-gray-700 mb-4">本次沒收了 <span id="final-score" class="text-3xl text-amber-600">0</span> 份食物</p>
                
                <div class="bg-amber-100 rounded-lg p-3 mb-4 w-full text-center">
                    <h2 class="text-lg font-black text-amber-900 mb-2 border-b-2 border-amber-300 pb-1">🏆 優秀護林員排行榜 🏆</h2>
                    <ul id="leaderboard-list" class="text-sm font-bold text-gray-800 text-left space-y-1">
                        <!-- 動態生成排行榜 -->
                    </ul>
                </div>

                <button onclick="startGame()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-black text-xl py-4 rounded-xl shadow-lg transform transition active:scale-95 border-b-4 border-amber-800">
                    重新挑戰
                </button>
            </div>

        </div>

        <!-- 隨機飄出的遊客心聲 -->
        <div id="tourist-text" class="absolute top-20 right-4 bg-white/90 px-3 py-2 rounded-xl text-sm font-bold text-gray-700 border-2 border-gray-300 shadow-md transform rotate-3 hidden z-10 transition-all">
            「蛤？拿麼可愛，為什麼不可以？！」
        </div>

    </div>

    <script>
        // --- 遊戲狀態與變數 ---
        let health = 100;
        let score = 0;
        let combo = 0;
        let gameInterval;
        let spawnInterval;
        let difficultyInterval;
        let isPlaying = false;
        let playerName = "無名護林員";
        
        let foods = [];
        let squirrels = [];
        
        let spawnRate = 2000; // 食物掉落間隔(毫秒)
        let fallSpeed = 3;    // 食物掉落速度

        // DOM 元素
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo-display');
        const healthTrees = document.getElementById('health-trees');
        const entitiesContainer = document.getElementById('entities');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');
        const treeLeft = document.getElementById('tree-left');
        const treeRight = document.getElementById('tree-right');
        const touristText = document.getElementById('tourist-text');
        const gameArea = document.getElementById('game-area');

        // --- 核心邏輯 ---

        function startGame() {
            // 獲取玩家名稱
            const nameInput = document.getElementById('player-name').value.trim();
            playerName = nameInput !== "" ? nameInput : "無名護林員";

            // 初始化數值
            health = 100;
            score = 0;
            combo = 0;
            spawnRate = 1800;
            fallSpeed = 3;
            foods = [];
            squirrels = [];
            isPlaying = true;
            
            updateUI();
            entitiesContainer.innerHTML = '';
            treeLeft.classList.remove('is-damaged');
            treeRight.classList.remove('is-damaged');

            // 隱藏介面
            overlay.classList.add('opacity-0', 'pointer-events-none');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // 初始生成兩隻可愛松鼠
            spawnSquirrel();
            spawnSquirrel();

            // 啟動迴圈
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);

            gameInterval = setInterval(gameLoop, 1000 / 30); // 30 FPS
            spawnInterval = setInterval(spawnFood, spawnRate);
            
            // 難度隨時間增加，遊客話語隨機出現
            difficultyInterval = setInterval(() => {
                if(!isPlaying) return;
                // 加快難度提升速度：每3秒提升一次，食物生成更快，掉落速度增加更多
                if(spawnRate > 350) {
                    spawnRate -= 150;
                    fallSpeed += 0.8;
                    clearInterval(spawnInterval);
                    spawnInterval = setInterval(spawnFood, spawnRate);
                }
                
                // 遊客台詞彈出
                if(Math.random() > 0.5) {
                    touristText.classList.remove('hidden');
                    setTimeout(() => touristText.classList.add('hidden'), 3000);
                }
            }, 3000);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);
            
            finalScore.innerText = score;
            saveAndDisplayLeaderboard();
            
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            gameOverScreen.classList.remove('hidden');
        }

        function saveAndDisplayLeaderboard() {
            // 從 localStorage 讀取歷史分數
            let scores = JSON.parse(localStorage.getItem('squirrelDefenderScores')) || [];
            
            // 加入本次分數
            scores.push({ name: playerName, score: score });
            
            // 依照分數由高到低排序
            scores.sort((a, b) => b.score - a.score);
            
            // 只保留前 5 名
            scores = scores.slice(0, 5);
            
            // 存回 localStorage
            localStorage.setItem('squirrelDefenderScores', JSON.stringify(scores));
            
            // 更新排行榜畫面
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';
            scores.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white/50 px-3 py-2 rounded shadow-sm";
                
                // 標示出玩家本次的成績
                if(entry.name === playerName && entry.score === score) {
                    li.className += " border-2 border-amber-500 bg-amber-200 text-amber-900";
                }
                
                let rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
                li.innerHTML = `<span><span class="w-6 inline-block">${rankIcon}</span> ${entry.name}</span><span class="text-amber-700 text-lg">${entry.score}</span>`;
                listEl.appendChild(li);
            });
        }

        function updateUI() {
            scoreDisplay.innerText = score;
            
            // 更新 Combo 顯示
            if (combo > 1) {
                comboDisplay.innerText = `${combo} 連擊!`;
                comboDisplay.classList.remove('hidden');
                comboDisplay.classList.remove('shake');
                void comboDisplay.offsetWidth; // 觸發重繪
                comboDisplay.classList.add('shake');
            } else {
                comboDisplay.classList.add('hidden');
            }

            // 更新樹木健康度 (滿分100，5棵樹，每棵代表20健康度)
            const maxTrees = 5;
            healthTrees.innerHTML = '';
            for(let i = 0; i < maxTrees; i++) {
                let treeHealth = health - (i * 20); 
                
                if (treeHealth >= 10) {
                    healthTrees.innerHTML += '<span class="transform scale-100 transition-transform origin-bottom">🌲</span>';
                } else if (treeHealth > 0) {
                    healthTrees.innerHTML += '<span class="transform scale-90 transition-transform origin-bottom drop-shadow-md">🍁</span>';
                } else {
                    healthTrees.innerHTML += '<span class="opacity-40 grayscale transform scale-75 transition-all origin-bottom">🪵</span>';
                }
            }

            if (health <= 0) {
                gameOver();
            }
        }

        // --- 產生實體 ---

        function spawnFood() {
            if(!isPlaying) return;
            const size = 50;
            const minX = 70;
            const maxX = gameArea.clientWidth - 70 - size;
            const x = Math.random() * (maxX - minX) + minX;
            
            const handEl = document.createElement('div');
            handEl.className = 'absolute img-hand default-hand hand-anim z-30 pointer-events-none';
            handEl.style.width = '60px';
            handEl.style.height = '60px';
            handEl.style.left = (x - 5) + 'px'; 
            entitiesContainer.appendChild(handEl);
            
            setTimeout(() => {
                if(handEl.parentNode) handEl.remove();
            }, 600);

            const el = document.createElement('div');
            el.className = 'absolute img-food default-food cursor-pointer transition-transform transform hover:scale-110 active:scale-90 z-20';
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = x + 'px';
            el.style.top = '-10px'; 

            el.addEventListener('mousedown', (e) => confiscateFood(e, foodObj));
            el.addEventListener('touchstart', (e) => { e.preventDefault(); confiscateFood(e, foodObj); });

            const foodObj = { el, x, y: -10, active: true };
            foods.push(foodObj);
            entitiesContainer.appendChild(el);
        }

        function spawnSquirrel() {
            const size = 90; // 稍微放大以展示您的畫作
            const minX = 70;
            const maxX = gameArea.clientWidth - 70 - size;
            const x = Math.random() * (maxX - minX) + minX;
            
            const el = document.createElement('div');
            // 只保留 img-cute，讓您的 SVG 直接顯示，不會被表情符號擋住
            el.className = 'absolute bottom-12 img-cute transition-all duration-300 z-10';
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = x + 'px';

            const squirrelObj = { 
                el, x, y: 0, 
                active: true, 
                state: 'cute',
                direction: Math.random() > 0.5 ? 1 : -1,
                speed: 1 + Math.random() * 2,
                clicksToCure: 0
            };
            
            el.addEventListener('mousedown', (e) => healSquirrel(e, squirrelObj));
            el.addEventListener('touchstart', (e) => { e.preventDefault(); healSquirrel(e, squirrelObj); });

            squirrels.push(squirrelObj);
            entitiesContainer.appendChild(el);
        }

        // --- 玩家互動 ---

        function confiscateFood(e, food) {
            if(!food.active || !isPlaying) return;
            food.active = false;
            food.el.remove();
            score += 1;
            combo += 1;
            updateUI();
            
            let floatText = "+1";
            let color = '#10b981'; 
            
            if (combo >= 2) {
                if (combo % 3 === 0 || combo >= 10) {
                    floatText = `鼠勾以內!!`;
                    color = '#ef4444'; 
                } else {
                    floatText = `${combo} 連擊!`;
                    color = '#f59e0b'; 
                }
            }
            
            showFloatingText(floatText, e.clientX, e.clientY, color);
        }

        function healSquirrel(e, sq) {
            if(!isPlaying || sq.state !== 'fat') return;
            
            sq.clicksToCure--;
            sq.el.classList.add('shake');
            setTimeout(() => sq.el.classList.remove('shake'), 200);

            showFloatingText("💢", e.clientX, e.clientY, '#ef4444');

            if(sq.clicksToCure <= 0) {
                sq.state = 'cute';
                sq.el.className = 'absolute bottom-12 img-cute transition-all duration-300 z-10';
                sq.el.style.width = '90px';
                sq.el.style.height = '90px';
                sq.speed = 1 + Math.random() * 2;
                sq.direction = Math.random() > 0.5 ? 1 : -1;
                showFloatingText("✨康復✨", e.clientX, e.clientY, '#3b82f6');
            }
        }

        function showFloatingText(text, x, y, color) {
            const containerBox = document.getElementById('game-container').getBoundingClientRect();
            const relX = x - containerBox.left;
            const relY = y - containerBox.top;

            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = relX + 'px';
            el.style.top = relY + 'px';
            if(color) el.style.color = color;
            
            document.getElementById('game-container').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // --- 遊戲迴圈更新邏輯 ---

        function gameLoop() {
            if(!isPlaying) return;

            const groundY = gameArea.clientHeight - 80; 

            foods.forEach(food => {
                if(!food.active) return;
                food.y += fallSpeed;
                food.el.style.top = food.y + 'px';

                if (food.y >= groundY) {
                    food.active = false;
                    food.el.remove();
                    combo = 0; 
                    updateUI();
                    
                    let closestSq = null;
                    let minDist = Infinity;
                    squirrels.forEach(sq => {
                        if(sq.state === 'cute') {
                            let dist = Math.abs(sq.x - food.x);
                            if(dist < minDist) {
                                minDist = dist;
                                closestSq = sq;
                            }
                        }
                    });

                    if(closestSq && minDist < 100) {
                        makeSquirrelFat(closestSq);
                    } else if(squirrels.length < 8) {
                        spawnSquirrel();
                    }
                }
            });

            foods = foods.filter(f => f.active);

            const gameWidth = gameArea.clientWidth;
            
            squirrels.forEach(sq => {
                if(sq.state === 'cute') {
                    sq.x += sq.speed * sq.direction;
                    if(sq.x < 70) { sq.x = 70; sq.direction *= -1; }
                    if(sq.x > gameWidth - 130) { sq.x = gameWidth - 130; sq.direction *= -1; }
                    sq.el.style.left = sq.x + 'px';
                    sq.el.style.transform = sq.direction === 1 ? 'scaleX(-1)' : 'scaleX(1)';
                } 
                else if (sq.state === 'fat') {
                    if(sq.direction === -1) { 
                        sq.x -= sq.speed;
                        if(sq.x <= 50) {
                            sq.x = 50;
                            damageTree('left');
                            sq.el.classList.add('shake');
                        }
                    } else { 
                        sq.x += sq.speed;
                        if(sq.x >= gameWidth - 130) {
                            sq.x = gameWidth - 130;
                            damageTree('right');
                            sq.el.classList.add('shake');
                        }
                    }
                    sq.el.style.left = sq.x + 'px';
                    sq.el.style.transform = sq.direction === 1 ? 'scaleX(-1)' : 'scaleX(1)';
                }
            });
        }

        function makeSquirrelFat(sq) {
            sq.state = 'fat';
            sq.clicksToCure = 3; 
            sq.speed = 1.5; 
            
            sq.el.className = 'absolute bottom-12 img-fat default-fat transition-all duration-300 z-10';
            sq.el.style.width = '90px';
            sq.el.style.height = '90px';
            
            sq.direction = Math.random() > 0.5 ? 1 : -1;
            
            const rect = sq.el.getBoundingClientRect();
            showFloatingText("⚠️變胖了!", rect.left + 20, rect.top, '#ef4444');
        }

        let damageCooldown = false;
        function damageTree(side) {
            if(damageCooldown || !isPlaying) return;
            
            health -= 2;
            updateUI();
            
            const treeEl = side === 'left' ? treeLeft : treeRight;
            treeEl.classList.add('is-damaged');
            
            const gameAreaElement = document.getElementById('game-area');
            gameAreaElement.style.boxShadow = 'inset 0 0 50px rgba(239, 68, 68, 0.8)';
            
            damageCooldown = true;
            setTimeout(() => {
                damageCooldown = false;
                gameAreaElement.style.boxShadow = 'none';
            }, 500);
        }

    </script>
</body>
</html>
