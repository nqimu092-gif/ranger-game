<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>護林員任務：拒絕餵食誘惑！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        
        /* * ==========================================
         * 🎨 圖片替換區 (強烈建議網頁圖片皆使用小寫英文檔名) 🎨
         * ==========================================
         */
        .img-ranger {
            /* 若有圖 1 解說員，請解除下方註解並放上檔名 (例如 ranger.png) */
            /* background-image: url('ranger.png'); */
            background-color: transparent;
        }
        .img-cute {
            /* 正常狀態：已更改為安全的英文檔名 */
            background-image: url('cute.svg');
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center bottom;
        }
        .img-fat {
            /* 暴走狀態：已更改為安全的英文檔名 */
            background-image: url('fat.svg');
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
        }
        .img-food {
            /* 若有圖 3 食物，請解除下方註解並放上檔名 */
            /* background-image: url('food.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .img-hand {
            /* 若有圖 3 遊客的手，請解除下方註解並放上檔名 */
            /* background-image: url('hand.png'); */
            background-size: contain; background-repeat: no-repeat; background-position: top center;
        }
        .img-tree {
            /* 若有圖 2 樹幹，請解除下方註解並放上檔名 */
            /* background-image: url('tree.png'); */
            background-size: cover; background-position: center;
        }

        /* 遊戲動畫與特效 */
        #game-area { overflow: hidden; position: relative; }
        .falling { animation: fall linear forwards; }
        .shake { animation: shake 0.5s; }
        
        @keyframes fall {
            from { top: -50px; }
            to { top: calc(100% - 80px); }
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        @keyframes floatText {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.2); }
        }
        @keyframes handDrop {
            0% { top: -60px; opacity: 0; }
            20% { top: -5px; opacity: 1; }
            70% { top: -5px; opacity: 1; }
            100% { top: -60px; opacity: 0; }
        }
        .hand-anim { animation: handDrop 0.6s ease-in-out forwards; }

        .floating-text {
            position: absolute;
            color: #ef4444;
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatText 1s forwards;
            text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            z-index: 50;
        }

        /* 預設圖形 (已移除會擋住您手繪圖的 cute 和 fat Emoji) */
        .default-food::after { content: '🍪'; font-size: 35px; display: block; text-align: center; line-height: 50px; }
        .default-hand::after { content: '🤚'; font-size: 50px; display: block; text-align: center; }
        .default-ranger::after { content: '🐿️💂‍♂️'; font-size: 60px; display: block; text-align: center; }
        .default-tree { background: linear-gradient(90deg, #6b4c2a, #8b6b45); }
        .damaged-mark { position: absolute; background-color: #d4a373; width: 60%; height: 30%; top: 50%; left: 20%; border-radius: 10px; opacity: 0; transition: opacity 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .is-damaged .damaged-mark { opacity: 1; }

    </style>
</head>
<body class="bg-amber-100 flex items-center justify-center h-[100dvh] m-0 select-none overflow-hidden">

    <!-- 遊戲主容器 -->
    <div id="game-container" class="w-full h-full sm:max-w-md sm:h-[800px] sm:max-h-[95dvh] sm:rounded-xl bg-[#dcebc8] relative shadow-2xl overflow-hidden border-0 sm:border-4 border-amber-800 flex flex-col">
        
        <!-- 頂部資訊列 -->
        <div id="ui-top" class="bg-amber-800 text-white p-3 flex justify-between items-center z-20">
            <div class="flex flex-col w-1/2">
                <span class="text-sm font-bold">森林健康度</span>
                <div id="health-trees" class="flex gap-1 mt-1 text-2xl drop-shadow-md transition-all h-8 items-center">
                    <!-- 樹木健康度將在這裡動態生成 -->
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-amber-200">沒收食物</div>
                <div class="flex items-end justify-end gap-2">
                    <div id="combo-display" class="text-sm font-bold text-red-300 hidden mb-1 animate-pulse"></div>
                    <div id="score" class="text-2xl font-black">0</div>
                </div>
            </div>
        </div>

        <!-- 遊戲畫面區 -->
        <div id="game-area" class="flex-grow relative bg-gradient-to-b from-blue-200 to-[#dcebc8] cursor-crosshair">
            <!-- 兩側的樹木 -->
            <div id="tree-left" class="absolute left-0 top-0 bottom-0 w-16 img-tree default-tree border-r-4 border-black/20 flex flex-col justify-end pb-20">
                <div class="damaged-mark"></div>
            </div>
            <div id="tree-right" class="absolute right-0 top-0 bottom-0 w-16 img-tree default-tree border-l-4 border-black/20 flex flex-col justify-end pb-20">
                <div class="damaged-mark"></div>
            </div>

            <!-- 動態物件容器 -->
            <div id="entities" class="absolute inset-0"></div>

            <!-- 地面 -->
            <div class="absolute bottom-0 w-full h-16 bg-[#8b6b45] border-t-8 border-green-700"></div>
        </div>

        <!-- 遊戲開始/結束 覆蓋層 -->
        <div id="overlay" class="absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center p-4 sm:p-6 text-center backdrop-blur-sm transition-opacity duration-300">
            
            <div id="start-screen" class="bg-[#fcf8ed] p-4 sm:p-6 rounded-2xl border-4 border-amber-600 shadow-xl w-[95%] sm:max-w-[90%] max-h-[90dvh] overflow-y-auto overscroll-contain flex flex-col">
                <div class="img-ranger default-ranger h-16 sm:h-24 mb-2 sm:mb-4 mx-auto shrink-0"></div>
                <h1 class="text-2xl sm:text-3xl font-black text-amber-900 mb-2 tracking-widest">護林員任務</h1>
                <p class="text-lg sm:text-xl font-bold text-gray-800 mb-4 bg-amber-200 inline-block px-3 py-1 rounded -rotate-2">「所以...餵食野生動物真的好嗎？」</p>
                <div class="text-left text-sm text-gray-700 space-y-2 mb-4 font-medium">
                    <p>🚨 <span class="font-bold text-red-600">遊客又來亂餵食了！</span></p>
                    <p>👉 點擊天上掉下來的<span class="text-amber-600 font-bold">人類食物</span>，將其沒收。</p>
                    <p>⚠️ 如果松鼠吃到食物，<span class="text-red-600 font-bold">族群量會變多然後啃咬樹皮造成樹木死亡</span>！</p>
                    <p>🩹 若出現肥胖松鼠，請<span class="font-bold underline text-blue-600">點擊牠1次</span>進行族群控制！</p>
                </div>
                
                <input type="text" id="player-name" placeholder="輸入您的護林員代號" class="w-full mb-4 px-4 py-3 rounded-xl border-2 border-amber-400 focus:outline-none focus:border-amber-600 text-center font-bold text-gray-700 text-lg shadow-inner shrink-0">
                
                <button onclick="startGame()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-black text-xl py-4 rounded-xl shadow-lg transform transition active:scale-95 border-b-4 border-amber-800 shrink-0">
                    開始守護森林！
                </button>
            </div>

            <div id="game-over-screen" class="hidden bg-[#fcf8ed] p-4 sm:p-6 rounded-2xl border-4 border-red-600 shadow-xl w-[95%] sm:max-w-[90%] max-h-[90dvh] overflow-y-auto overscroll-contain flex flex-col">
                <!-- 遊戲結束畫面的大圖也改為壞松鼠 -->
                <div class="img-fat h-20 w-20 sm:h-24 sm:w-24 mx-auto mb-2 sm:mb-4 bg-red-100 rounded-full border-4 border-red-400 p-2 shrink-0"></div>
                <h1 class="text-2xl sm:text-3xl font-black text-red-600 mb-2">森林受損嚴重</h1>
                <div class="bg-red-50 p-3 rounded-lg text-left text-sm text-red-800 font-medium mb-4 border border-red-200 shrink-0">
                    <p class="mb-2">「人類食物會導致野生動物太肥、嚴重影響健康...」</p>
                    <p>「餵食更會導致族群過度成長，使林木遭受嚴重鼠害...」</p>
                </div>
                <p class="text-lg font-bold text-gray-700 mb-2">本次沒收了 <span id="final-score" class="text-3xl text-amber-600">0</span> 份食物</p>
                
                <div class="bg-amber-100 rounded-lg p-2 mb-4 w-full text-center relative shrink-0">
                    <h2 class="text-lg font-black text-amber-900 mb-2 border-b-2 border-amber-300 pb-1">🌐 全球護林員排行榜 🌐</h2>
                    <ul id="leaderboard-list" class="text-sm font-bold text-gray-800 text-left space-y-1">
                        <!-- 動態生成排行榜 -->
                        <li class="text-center text-gray-500 py-2">讀取資料庫中...</li>
                    </ul>
                </div>

                <button onclick="startGame()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-black text-xl py-4 rounded-xl shadow-lg transform transition active:scale-95 border-b-4 border-amber-800 shrink-0">
                    重新挑戰
                </button>
            </div>

        </div>

        <!-- 隨機飄出的遊客心聲 -->
        <div id="tourist-text" class="absolute top-16 sm:top-20 right-2 sm:right-4 bg-white/90 px-3 py-2 rounded-xl text-xs sm:text-sm font-bold text-gray-700 border-2 border-gray-300 shadow-md transform rotate-3 hidden z-10 transition-all max-w-[60%]">
            「蛤？拿麼可愛，為什麼不可以？！」
        </div>

    </div>

    <!-- 將原本的腳本改為 module，並引入 Firebase 雲端資料庫模組 -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- 雲端資料庫 (Firebase) 設定 ---
        let db, auth, appId, currentUser;
        let isFirebaseActive = false;
        let globalScores = [];

        // 檢查環境中是否具備雲端連線變數
        let firebaseConfigObj = null;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfigObj = JSON.parse(__firebase_config);
        } else {
            // =========================================================================
            // 🚀 若要放上 GitHub Pages 並擁有全球排行榜，請將您的 Firebase 設定貼在下方 🚀
            // =========================================================================
            /* firebaseConfigObj = {
                apiKey: "填入您的_API_KEY",
                authDomain: "填入您的_PROJECT_ID.firebaseapp.com",
                projectId: "填入您的_PROJECT_ID",
                storageBucket: "填入您的_PROJECT_ID.appspot.com",
                messagingSenderId: "填入您的_SENDER_ID",
                appId: "填入您的_APP_ID"
            };
            */
        }

        if (firebaseConfigObj) {
            try {
                const app = initializeApp(firebaseConfigObj);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                isFirebaseActive = true;

                // 匿名登入或憑證登入，取得上傳成績的權限
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("登入失敗", e); }
                };
                initAuth();

                // 監聽排行榜資料
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                        onSnapshot(leaderboardRef, (snapshot) => {
                            const scores = [];
                            snapshot.forEach(doc => scores.push(doc.data()));
                            
                            // 在網頁端根據分數高低進行排序
                            scores.sort((a, b) => b.score - a.score);
                            globalScores = scores.slice(0, 5); // 取前五名
                            
                            // 如果目前處於結算畫面，立即更新顯示
                            if (!isPlaying && !document.getElementById('game-over-screen').classList.contains('hidden')) {
                                updateLeaderboardUI();
                            }
                        }, (error) => {
                            console.error("無法取得排行榜資料:", error);
                        });
                    }
                });
            } catch (e) {
                console.warn("雲端服務啟動失敗，將降級為本機模式。", e);
            }
        }

        // --- 遊戲狀態與變數 ---
        let health = 100;
        let score = 0;
        let combo = 0;
        let gameInterval;
        let spawnInterval;
        let difficultyInterval;
        let isPlaying = false;
        let playerName = "無名護林員";
        
        let foods = [];
        let squirrels = [];
        
        let spawnRate = 2000; 
        let fallSpeed = 3;    

        // DOM 元素
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo-display');
        const healthTrees = document.getElementById('health-trees');
        const entitiesContainer = document.getElementById('entities');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');
        const treeLeft = document.getElementById('tree-left');
        const treeRight = document.getElementById('tree-right');
        const touristText = document.getElementById('tourist-text');
        const gameArea = document.getElementById('game-area');

        // 將 startGame 綁定到 window 讓按鈕可以點擊到
        window.startGame = function() {
            const nameInput = document.getElementById('player-name').value.trim();
            playerName = nameInput !== "" ? nameInput : "無名護林員";

            health = 100;
            score = 0;
            combo = 0;
            spawnRate = 1800;
            fallSpeed = 3;
            foods = [];
            squirrels = [];
            isPlaying = true;
            
            updateUI();
            entitiesContainer.innerHTML = '';
            treeLeft.classList.remove('is-damaged');
            treeRight.classList.remove('is-damaged');

            overlay.classList.add('opacity-0', 'pointer-events-none');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // 正常情況下，保持3隻基礎可愛松鼠
            spawnSquirrel('cute');
            spawnSquirrel('cute');
            spawnSquirrel('cute');

            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);

            gameInterval = setInterval(gameLoop, 1000 / 30); 
            spawnInterval = setInterval(spawnFood, spawnRate);
            
            difficultyInterval = setInterval(() => {
                if(!isPlaying) return;
                if(spawnRate > 350) {
                    spawnRate -= 150;
                    fallSpeed += 0.8;
                    clearInterval(spawnInterval);
                    spawnInterval = setInterval(spawnFood, spawnRate);
                }
                
                if(Math.random() > 0.5) {
                    touristText.classList.remove('hidden');
                    setTimeout(() => touristText.classList.add('hidden'), 3000);
                }
            }, 3000);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            clearInterval(difficultyInterval);
            
            finalScore.innerText = score;
            
            // 處理排行榜邏輯 (雲端 或 本機)
            handleLeaderboard();
            
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            gameOverScreen.classList.remove('hidden');
        }

        async function handleLeaderboard() {
            if (isFirebaseActive && currentUser) {
                // 有雲端環境：上傳成績
                const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                try {
                    await addDoc(leaderboardRef, { 
                        name: playerName, 
                        score: score, 
                        timestamp: Date.now() 
                    });
                    // UI 會被 onSnapshot 監聽器自動更新，但我們先顯示目前的確保畫面不會空著
                    updateLeaderboardUI();
                } catch (e) {
                    console.error("成績上傳失敗:", e);
                    handleLocalLeaderboard(); // 失敗則退回本機儲存
                }
            } else {
                // 無雲端環境 (例如從 GitHub Pages 執行但沒自己綁資料庫)：使用本機儲存
                handleLocalLeaderboard();
            }
        }

        function handleLocalLeaderboard() {
            let scores = JSON.parse(localStorage.getItem('squirrelDefenderScores')) || [];
            scores.push({ name: playerName, score: score });
            scores.sort((a, b) => b.score - a.score);
            globalScores = scores.slice(0, 5);
            localStorage.setItem('squirrelDefenderScores', JSON.stringify(globalScores));
            document.querySelector('#leaderboard-list').previousElementSibling.innerText = "🏆 本機護林員排行榜 🏆";
            updateLeaderboardUI();
        }

        function updateLeaderboardUI() {
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';
            
            if (globalScores.length === 0) {
                listEl.innerHTML = '<li class="text-center text-gray-500 py-2">目前還沒有紀錄！</li>';
                return;
            }

            globalScores.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white/50 px-3 py-2 rounded shadow-sm";
                
                // 若這筆資料是玩家剛剛打出的成績，給予金色高亮框
                if(entry.name === playerName && entry.score === score && score > 0) {
                    li.className += " border-2 border-amber-500 bg-amber-200 text-amber-900";
                }
                
                let rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
                li.innerHTML = `<span><span class="w-6 inline-block">${rankIcon}</span> ${entry.name}</span><span class="text-amber-700 text-lg">${entry.score}</span>`;
                listEl.appendChild(li);
            });
        }

        function updateUI() {
            scoreDisplay.innerText = score;
            
            if (combo > 1) {
                comboDisplay.innerText = `${combo} 連擊!`;
                comboDisplay.classList.remove('hidden');
                comboDisplay.classList.remove('shake');
                void comboDisplay.offsetWidth; 
                comboDisplay.classList.add('shake');
            } else {
                comboDisplay.classList.add('hidden');
            }

            // 森林健康度階段變化邏輯
            // 健康: 🌲, 死亡: 🪾
            let currentHealth = Math.max(0, health);
            let greenCount = Math.ceil(currentHealth / 20); // 共 5 棵樹，每棵代表 20 點健康度
            let stumpCount = 5 - greenCount;

            healthTrees.innerHTML = '';
            for(let i = 0; i < greenCount; i++) {
                healthTrees.innerHTML += '<span class="transform scale-100 transition-transform origin-bottom">🌲</span>';
            }
            for(let i = 0; i < stumpCount; i++) {
                healthTrees.innerHTML += '<span class="opacity-60 transform scale-90 transition-all origin-bottom drop-shadow-sm">🪾</span>';
            }

            if (health <= 0) {
                gameOver();
            }
        }

        function spawnFood() {
            if(!isPlaying) return;
            const size = 50;
            const minX = 70;
            const maxX = gameArea.clientWidth - 70 - size;
            const x = Math.random() * (maxX - minX) + minX;
            
            const handEl = document.createElement('div');
            handEl.className = 'absolute img-hand default-hand hand-anim z-30 pointer-events-none';
            handEl.style.width = '60px';
            handEl.style.height = '60px';
            handEl.style.left = (x - 5) + 'px'; 
            entitiesContainer.appendChild(handEl);
            
            setTimeout(() => {
                if(handEl.parentNode) handEl.remove();
            }, 600);

            const el = document.createElement('div');
            el.className = 'absolute img-food default-food cursor-pointer transition-transform transform hover:scale-110 active:scale-90 z-20';
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = x + 'px';
            el.style.top = '-10px'; 

            el.addEventListener('mousedown', (e) => confiscateFood(e, foodObj));
            el.addEventListener('touchstart', (e) => { e.preventDefault(); confiscateFood(e, foodObj); });

            const foodObj = { el, x, y: -10, active: true };
            foods.push(foodObj);
            entitiesContainer.appendChild(el);
        }

        function spawnSquirrel(type = 'cute', spawnX = null) {
            const size = 90; 
            const minX = 70;
            const maxX = gameArea.clientWidth - 70 - size;
            // 如果有指定 X 座標(食物掉落處)就用指定的，否則隨機產生
            const x = spawnX !== null ? spawnX : (Math.random() * (maxX - minX) + minX);
            
            const el = document.createElement('div');
            // 根據類型給予不同的 CSS 與圖案
            el.className = type === 'cute' 
                ? 'absolute bottom-12 img-cute transition-all duration-300 z-10'
                : 'absolute bottom-12 img-fat transition-all duration-300 z-10';
            
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = x + 'px';

            const squirrelObj = { 
                el, x, y: 0, 
                active: true, 
                state: type,
                direction: Math.random() > 0.5 ? 1 : -1,
                speed: type === 'cute' ? (1 + Math.random() * 2) : 1.5,
                clicksToCure: type === 'fat' ? 1 : 0
            };
            
            el.addEventListener('mousedown', (e) => healSquirrel(e, squirrelObj));
            el.addEventListener('touchstart', (e) => { e.preventDefault(); healSquirrel(e, squirrelObj); });

            squirrels.push(squirrelObj);
            entitiesContainer.appendChild(el);

            if (type === 'fat') {
                const rect = el.getBoundingClientRect();
                showFloatingText("⚠️族群擴張!", rect.left + 20, rect.top, '#ef4444');
            }
        }

        function confiscateFood(e, food) {
            if(!food.active || !isPlaying) return;
            food.active = false;
            food.el.remove();
            score += 1;
            combo += 1;
            updateUI();
            
            let floatText = "+1";
            let color = '#10b981'; 
            
            if (combo >= 2) {
                if (combo % 3 === 0 || combo >= 10) {
                    floatText = `鼠勾以內!!`;
                    color = '#ef4444'; 
                } else {
                    floatText = `${combo} 連擊!`;
                    color = '#f59e0b'; 
                }
            }
            
            showFloatingText(floatText, e.clientX, e.clientY, color);
        }

        function healSquirrel(e, sq) {
            if(!isPlaying || sq.state !== 'fat') return;
            
            sq.clicksToCure--;
            sq.el.classList.add('shake');
            setTimeout(() => sq.el.classList.remove('shake'), 200);

            showFloatingText("💢", e.clientX, e.clientY, '#ef4444');

            if(sq.clicksToCure <= 0) {
                sq.active = false;
                sq.el.remove();
                showFloatingText("🛡️族群控制", e.clientX, e.clientY, '#3b82f6');
            }
        }

        function showFloatingText(text, x, y, color) {
            const containerBox = document.getElementById('game-container').getBoundingClientRect();
            const relX = x - containerBox.left;
            const relY = y - containerBox.top;

            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = relX + 'px';
            el.style.top = relY + 'px';
            if(color) el.style.color = color;
            
            document.getElementById('game-container').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function gameLoop() {
            if(!isPlaying) return;

            const groundY = gameArea.clientHeight - 80; 

            foods.forEach(food => {
                if(!food.active) return;
                food.y += fallSpeed;
                food.el.style.top = food.y + 'px';

                if (food.y >= groundY) {
                    food.active = false;
                    food.el.remove();
                    combo = 0; 
                    updateUI();
                    
                    // 食物沒有被撿走，新增一隻會破壞樹木的胖松鼠
                    spawnSquirrel('fat', food.x);
                }
            });

            foods = foods.filter(f => f.active);
            // 濾除已經被「族群控制」的松鼠
            squirrels = squirrels.filter(sq => sq.active);

            const gameWidth = gameArea.clientWidth;
            
            squirrels.forEach(sq => {
                if(sq.state === 'cute') {
                    sq.x += sq.speed * sq.direction;
                    if(sq.x < 70) { sq.x = 70; sq.direction *= -1; }
                    if(sq.x > gameWidth - 130) { sq.x = gameWidth - 130; sq.direction *= -1; }
                    sq.el.style.left = sq.x + 'px';
                    sq.el.style.transform = sq.direction === 1 ? 'scaleX(-1)' : 'scaleX(1)';
                } 
                else if (sq.state === 'fat') {
                    if(sq.direction === -1) { 
                        sq.x -= sq.speed;
                        if(sq.x <= 50) {
                            sq.x = 50;
                            damageTree('left');
                            sq.el.classList.add('shake');
                        }
                    } else { 
                        sq.x += sq.speed;
                        if(sq.x >= gameWidth - 130) {
                            sq.x = gameWidth - 130;
                            damageTree('right');
                            sq.el.classList.add('shake');
                        }
                    }
                    sq.el.style.left = sq.x + 'px';
                    sq.el.style.transform = sq.direction === 1 ? 'scaleX(-1)' : 'scaleX(1)';
                }
            });
        }

        let damageCooldown = false;
        function damageTree(side) {
            if(damageCooldown || !isPlaying) return;
            
            health -= 2;
            updateUI();
            
            const treeEl = side === 'left' ? treeLeft : treeRight;
            treeEl.classList.add('is-damaged');
            
            const gameAreaElement = document.getElementById('game-area');
            gameAreaElement.style.boxShadow = 'inset 0 0 50px rgba(239, 68, 68, 0.8)';
            
            damageCooldown = true;
            setTimeout(() => {
                damageCooldown = false;
                gameAreaElement.style.boxShadow = 'none';
            }, 500);
        }

    </script>
</body>
</html>
